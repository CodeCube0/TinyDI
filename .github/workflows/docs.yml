name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-app/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-app/package-lock.json

      - name: Install
        working-directory: docs-app
        run: npm ci

      - name: Build
        working-directory: docs-app
        run: npm run build
        env:
          # This repo is a GitHub Pages *project* site, served under
          # /TinyDI/ rather than at the domain root — see docs-app/src/nav.mjs
          # for why BASE_PATH/SITE_URL are overridable via env vars.
          DOCS_BASE_PATH: /TinyDI
          DOCS_SITE_URL: https://codecube0.github.io

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
