name: Feature Request
description: Suggest an addition or change to TinyDI
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        TinyDI is deliberately minimal ("explicit over magic"). Before requesting a feature, it's worth checking [ROADMAP.md](https://github.com/CodeCube0/TinyDI/blob/main/ROADMAP.md) to see if it's already planned for a future version.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the desired API — this helps evaluate whether it fits TinyDI's scope.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Sketch the API you'd expect, if you have one in mind.
      render: typescript
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using today, or other approaches you considered.
    validations:
      required: false
